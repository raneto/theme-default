{{> header}}

<div class="row">
  <div class="col-sm-6 p-4">
    <div class="alert" id="edit-status" role="alert"></div>
    <h2>{{lang.global.editor}}</h2>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <p class="entry-word-count mb-0"></p>
      <div
        class="btn-group btn-group-sm"
        role="group"
        aria-label="Editor actions"
      >
        <button type="button" class="btn btn-primary close-edit">
          {{lang.global.close}}
        </button>
        <button type="button" class="btn btn-success save-page">
          {{lang.global.save}}
        </button>
      </div>
    </div>

    <div>
      <div id="accordion">
        <div class="card">
          <div class="card-header" id="metadata">
            <h3 class="card-title">
              <a
                role="button"
                data-bs-toggle="collapse"
                data-bs-parent="#accordion"
                data-bs-target="#collapseOne"
                href="#collapseOne"
                aria-expanded="false"
                aria-controls="collapseOne"
              >
                {{lang.edit.headerMetaInfo}}
              </a>
            </h3>
          </div>
          <div
            id="collapseOne"
            class="card-collapse collapse out"
            aria-labelledby="metadata"
          >
            <div class="card-body">
              <div>
                <label for="entry-metainfo-title" class="form-label col-sm-3"
                  >{{lang.edit.labelMetaTitle}}</label
                >
                <div class="col-sm-9">
                  <input
                    id="entry-metainfo-title"
                    type="text"
                    value="{{{meta.custom_title}}}"
                    class="form-control"
                  />
                </div>
              </div>
              <div>
                <label
                  for="entry-metainfo-description"
                  class="form-label col-sm-3"
                  >{{lang.edit.labelMetaDescription}}</label
                >
                <div class="col-sm-9">
                  <input
                    id="entry-metainfo-description"
                    type="text"
                    value="{{{meta.description}}}"
                    class="form-control"
                  />
                </div>
              </div>
              <div>
                <label for="entry-metainfo-sort" class="form-label col-sm-3"
                  >{{lang.edit.labelMetaSort}}</label
                >
                <div class="col-sm-9">
                  <input
                    id="entry-metainfo-sort"
                    type="number"
                    value="{{{meta.sort}}}"
                    class="form-control"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div>
        <label for="entry-markdown" class="visually-hidden"
          >{{lang.global.editor}}</label
        >
        <textarea id="entry-markdown">{{{content}}}</textarea>
      </div>
    </div>

    <div
      class="btn-group btn-group-sm float-end mt-3"
      role="group"
      aria-label="{{lang.global.editor}}"
    >
      <button type="button" class="btn btn-primary close-edit">
        {{lang.global.close}}
      </button>
      <button type="button" class="btn btn-success save-page">
        {{lang.global.save}}
      </button>
    </div>
  </div>
  <section class="col-sm-6 p-4">
    <h2>
      {{lang.edit.preview}}{{#meta.title}} - {{meta.title}}{{/meta.title}}
    </h2>
    <div class="entry-preview-content">
      <div class="rendered-markdown"></div>
    </div>
    <hr />
    <footer class="page-meta clearfix">
      <div class="last-updated float-end">
        {{lang.global.lastUpdated}} {{last_modified}}
      </div>
    </footer>
  </section>
</div>

{{> footer}}
